<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털노마드 | 투자자</title>
<meta name="description" content="디지털노마드 — 투자자">
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #1a1a1a;
    --line: #ececec;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo",
      "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 24px;
  }

  header {
    padding: 120px 0 64px;
  }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 18px;
  }

  h1 {
    font-size: clamp(32px, 6vw, 44px);
    font-weight: 700;
    margin: 0 0 10px;
    letter-spacing: -0.02em;
  }

  .role {
    font-size: 18px;
    color: var(--muted);
    margin: 0;
    font-weight: 400;
  }

  main {
    padding-bottom: 100px;
  }

  section {
    padding: 40px 0;
    border-top: 1px solid var(--line);
  }

  section h2 {
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 20px;
    font-weight: 600;
  }

  section p {
    font-size: 16px;
    color: var(--text);
    margin: 0;
  }

  section p + p {
    margin-top: 16px;
  }

  footer {
    padding: 40px 0 60px;
    border-top: 1px solid var(--line);
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">Digital Nomad · Investor</p>
      <h1>디지털노마드</h1>
      <p class="role">투자자</p>
    </header>

    <main>
      <section>
        <h2>About</h2>
        <p>
          정해진 사무실 없이 세계 곳곳을 옮겨 다니며 일하고, 투자합니다.
          한 곳에 머무르지 않는 삶의 방식 속에서 시장을 바라보는 다양한 시각을 얻고,
          그 시각을 바탕으로 투자 의사결정을 내리는 것을 즐깁니다.
        </p>
        <p>
          숫자와 데이터를 좋아하지만, 결국 좋은 투자는 좋은 삶의 태도에서 나온다고 믿습니다.
          느리더라도 꾸준하게, 그리고 어디서든 일할 수 있는 자유를 지키는 것이 목표입니다.
        </p>
      </section>
    </main>

    <footer>
      &copy; 2026 디지털노마드
    </footer>
  </div>
</body>
</html>
